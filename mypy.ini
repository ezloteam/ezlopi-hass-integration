; Strict typing config for the ezloPi integration (quality-scale `strict-typing`).
; Mirrors Home Assistant core's strict profile: `--strict` with implicit
; re-export allowed (HA core does not enable no_implicit_reexport, so
; `from homeassistant.components.light import ColorMode` etc. type-check).
;
; Verify with:
;   mypy --config-file mypy.ini custom_components/ezlopi
[mypy]
strict = True
implicit_reexport = True
follow_imports = silent
warn_unused_ignores = True
show_error_codes = True
